name: Beta Release

on:
  push:
    branches:
      - beta
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: beta-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup npm for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Validate published package readiness
        run: npm run validate:pack:syncore

      - name: Auto-create syncorejs changeset
        run: npm run changeset:auto:syncore
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}

      - name: Target beta as the Changesets release branch
        run: node ./scripts/set-changeset-base-branch.mjs beta

      - name: Create beta release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run changeset:beta:version
          publish: npm run changeset:beta:publish
          commit: "chore: version beta packages"
          title: "chore: version beta packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
