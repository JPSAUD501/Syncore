name: CI

on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0

      - name: Install dependencies
        run: bun ci

      - name: API check
        run: bun run api:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Surface Contracts
        run: bun run --filter @syncore/testing test:surface

      - name: Adapter Contracts
        run: bun run --filter @syncore/testing test:contract

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Validate syncore package
        run: bun run validate:pack:syncore

  smoke:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0

      - name: Install dependencies
        run: bun ci

      - name: Install Playwright browsers
        run: bun run playwright install --with-deps chromium

      - name: Run smoke suite
        run: xvfb-run -a bun run test:smoke
