name: CI

on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: API check
        run: npm run api:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Surface Contracts
        run: npm run test:surface --workspace @syncore/testing

      - name: Adapter Contracts
        run: npm run test:contract --workspace @syncore/testing

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Validate syncore package
        run: npm run validate:pack:syncore

  smoke:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm exec -- playwright install --with-deps chromium

      - name: Run smoke suite
        run: xvfb-run -a npm run test:smoke
