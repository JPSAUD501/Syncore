name: Bug report
description: Report a reproducible problem in Syncore.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for a maintainer
        or contributor to reproduce the problem quickly.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem.
      placeholder: The CLI crashes when...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of Syncore is affected most directly?
      options:
        - syncorejs
        - cli
        - core
        - schema
        - react
        - platform-web
        - platform-node
        - platform-expo
        - next
        - svelte
        - examples
        - docs
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps, sample project, or commands that reproduce the bug.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Include OS, Bun, Node, package version, and target platform if relevant.
      placeholder: |
        OS:
        Bun:
        Node:
        syncorejs:
        Platform:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output, stack traces, or screenshots.
      render: shell
