<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts — Syncore Browser ESM</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        background: #0f1115;
        color: #e2ddd3;
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: 100vh;
        gap: 0;
      }

      /* ─── Header ─── */
      .header {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(15, 17, 21, 0.9);
        backdrop-filter: blur(8px);
      }

      .header h1 {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .header-meta {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 13px;
        color: #6b7280;
      }

      #count {
        font-family: "IBM Plex Mono", monospace;
        color: #5de4c7;
      }

      #stats {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        color: #6b7280;
      }

      #stats strong {
        color: #e2ddd3;
        font-weight: 600;
      }

      /* ─── Main panel ─── */
      .main-panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Form */
      .form-bar {
        display: flex;
        gap: 8px;
        padding: 16px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        flex-wrap: wrap;
      }

      .form-bar input {
        flex: 1 1 140px;
        min-width: 120px;
        padding: 9px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
        font-family: inherit;
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s;
      }

      .form-bar input:focus {
        border-color: rgba(93, 228, 199, 0.4);
      }

      .form-bar input::placeholder {
        color: #4b5563;
      }

      #add-btn {
        padding: 9px 16px;
        border-radius: 6px;
        border: none;
        background: #5de4c7;
        color: #0f1115;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: opacity 0.15s;
      }

      #seed-btn {
        padding: 9px 12px;
        border-radius: 6px;
        border: 1px solid rgba(93, 228, 199, 0.18);
        background: rgba(93, 228, 199, 0.08);
        color: #5de4c7;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }

      #add-btn:hover,
      #seed-btn:hover {
        opacity: 0.85;
      }

      /* Search */
      .search-bar {
        padding: 12px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      #search-input {
        width: 100%;
        padding: 9px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: inherit;
        font-family: inherit;
        font-size: 13px;
        outline: none;
      }

      #search-input:focus {
        border-color: rgba(93, 228, 199, 0.3);
      }

      #search-input::placeholder {
        color: #4b5563;
      }

      /* Contact list */
      #contact-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 16px;
      }

      #contact-list::-webkit-scrollbar {
        width: 4px;
      }

      #contact-list::-webkit-scrollbar-thumb {
        background: rgba(93, 228, 199, 0.15);
        border-radius: 2px;
      }

      .contact-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 8px;
        margin-bottom: 4px;
        transition: background 0.12s;
      }

      .contact-card:hover {
        background: rgba(255, 255, 255, 0.04);
      }

      .contact-card--active {
        background: rgba(93, 228, 199, 0.08);
      }

      .contact-avatar {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 15px;
        color: #0f1115;
        flex-shrink: 0;
      }

      .contact-info {
        flex: 1;
        min-width: 0;
      }

      .contact-name {
        font-weight: 600;
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .contact-meta {
        font-size: 12px;
        color: #6b7280;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: "IBM Plex Mono", monospace;
      }

      .contact-time {
        font-size: 11px;
        color: #4b5563;
        margin-top: 2px;
      }

      .remove-btn {
        background: none;
        border: none;
        color: #4b5563;
        font-size: 18px;
        cursor: pointer;
        padding: 2px 6px;
        border-radius: 4px;
        line-height: 1;
        opacity: 0;
        transition: all 0.12s;
      }

      .favorite-btn {
        background: none;
        border: none;
        color: #4b5563;
        font-size: 18px;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
        line-height: 1;
        opacity: 0;
        transition: all 0.12s;
      }

      .favorite-btn--active {
        color: #f2a65a;
        opacity: 1;
      }

      .contact-card:hover .remove-btn,
      .contact-card:hover .favorite-btn {
        opacity: 1;
      }

      .favorite-btn:hover {
        color: #f2a65a;
      }

      .remove-btn:hover {
        color: #e06c75;
      }

      .empty {
        text-align: center;
        padding: 48px 20px;
        color: #4b5563;
        font-style: italic;
        font-size: 14px;
      }

      .attachment-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .attachment-title {
        font-size: 13px;
        color: #e2ddd3;
        font-weight: 600;
      }

      #attachment-label {
        cursor: pointer;
        border: 1px solid rgba(93, 228, 199, 0.18);
        background: rgba(93, 228, 199, 0.08);
        color: #5de4c7;
        padding: 8px 12px;
        border-radius: 6px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        font-weight: 600;
      }

      #attachment-input:disabled + #attachment-label {
        cursor: not-allowed;
        color: #6b7280;
        border-color: rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
      }

      #attachment-panel {
        max-height: 190px;
        overflow-y: auto;
        padding: 8px 24px 16px;
      }

      .attachment-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 9px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .attachment-name {
        font-size: 13px;
        font-weight: 600;
      }

      .attachment-meta {
        color: #6b7280;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        margin-top: 2px;
      }

      .attachment-remove {
        border: none;
        background: transparent;
        color: #e06c75;
        cursor: pointer;
        font-size: 12px;
      }

      .attachment-empty {
        padding: 18px 0;
      }

      /* ─── Responsive ─── */
      @media (max-width: 720px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- Header -->
      <header class="header">
        <h1>Contacts</h1>
        <div class="header-meta">
          <span id="stats"><span><strong>0</strong> contacts</span></span>
          <span id="count">0 contacts</span>
        </div>
      </header>

      <!-- Main panel -->
      <div class="main-panel">
        <div class="form-bar">
          <input id="name-input" placeholder="Name" />
          <input id="email-input" placeholder="Email" />
          <input id="company-input" placeholder="Company" />
          <button id="add-btn">+ Add</button>
          <button id="seed-btn" type="button">Seed demo</button>
        </div>
        <div class="search-bar">
          <input id="search-input" placeholder="Search contacts..." />
        </div>
        <div id="contact-list">
          <div class="empty">Booting Syncore...</div>
        </div>
        <div class="attachment-bar">
          <span class="attachment-title">Files</span>
          <div>
            <input id="attachment-input" type="file" hidden />
            <label id="attachment-label" for="attachment-input">Storage is not ready</label>
          </div>
        </div>
        <div id="attachment-panel">
          <div class="empty attachment-empty">Select a contact to manage files.</div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
