<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts — Syncore Browser ESM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        background: #0f1115;
        color: #e2ddd3;
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 340px;
        grid-template-rows: auto 1fr;
        height: 100vh;
        gap: 0;
      }

      /* ─── Header ─── */
      .header {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(15, 17, 21, 0.9);
        backdrop-filter: blur(8px);
      }

      .header h1 {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .header-meta {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 13px;
        color: #6b7280;
      }

      #count {
        font-family: "IBM Plex Mono", monospace;
        color: #5de4c7;
      }

      .badge {
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 4px;
        background: rgba(93, 228, 199, 0.1);
        color: #5de4c7;
        border: 1px solid rgba(93, 228, 199, 0.15);
      }

      /* ─── Main panel ─── */
      .main-panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-right: 1px solid rgba(255, 255, 255, 0.06);
      }

      /* Form */
      .form-bar {
        display: flex;
        gap: 8px;
        padding: 16px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        flex-wrap: wrap;
      }

      .form-bar input {
        flex: 1 1 140px;
        min-width: 120px;
        padding: 9px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
        font-family: inherit;
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s;
      }

      .form-bar input:focus {
        border-color: rgba(93, 228, 199, 0.4);
      }

      .form-bar input::placeholder {
        color: #4b5563;
      }

      #add-btn {
        padding: 9px 16px;
        border-radius: 6px;
        border: none;
        background: #5de4c7;
        color: #0f1115;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: opacity 0.15s;
      }

      #add-btn:hover {
        opacity: 0.85;
      }

      /* Search */
      .search-bar {
        padding: 12px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      #search-input {
        width: 100%;
        padding: 9px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: inherit;
        font-family: inherit;
        font-size: 13px;
        outline: none;
      }

      #search-input:focus {
        border-color: rgba(93, 228, 199, 0.3);
      }

      #search-input::placeholder {
        color: #4b5563;
      }

      /* Contact list */
      #contact-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 16px;
      }

      #contact-list::-webkit-scrollbar {
        width: 4px;
      }

      #contact-list::-webkit-scrollbar-thumb {
        background: rgba(93, 228, 199, 0.15);
        border-radius: 2px;
      }

      .contact-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 8px;
        margin-bottom: 4px;
        transition: background 0.12s;
      }

      .contact-card:hover {
        background: rgba(255, 255, 255, 0.04);
      }

      .contact-avatar {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 15px;
        color: #0f1115;
        flex-shrink: 0;
      }

      .contact-info {
        flex: 1;
        min-width: 0;
      }

      .contact-name {
        font-weight: 600;
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .contact-meta {
        font-size: 12px;
        color: #6b7280;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: "IBM Plex Mono", monospace;
      }

      .contact-time {
        font-size: 11px;
        color: #4b5563;
        margin-top: 2px;
      }

      .remove-btn {
        background: none;
        border: none;
        color: #4b5563;
        font-size: 18px;
        cursor: pointer;
        padding: 2px 6px;
        border-radius: 4px;
        line-height: 1;
        opacity: 0;
        transition: all 0.12s;
      }

      .contact-card:hover .remove-btn {
        opacity: 1;
      }

      .remove-btn:hover {
        color: #e06c75;
      }

      .empty {
        text-align: center;
        padding: 48px 20px;
        color: #4b5563;
        font-style: italic;
        font-size: 14px;
      }

      /* ─── Log panel ─── */
      .log-panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #0a0c0f;
      }

      .log-header {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #6b7280;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .log-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #5de4c7;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      #log {
        flex: 1;
        overflow-y: auto;
        padding: 12px 16px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        line-height: 1.7;
        color: #6b7280;
        white-space: pre-wrap;
        word-break: break-all;
      }

      #log::-webkit-scrollbar {
        width: 4px;
      }

      #log::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
      }

      /* ─── Responsive ─── */
      @media (max-width: 720px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr 200px;
        }

        .main-panel {
          border-right: none;
        }

        .log-panel {
          border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- Header -->
      <header class="header">
        <h1>Contacts</h1>
        <div class="header-meta">
          <span id="count">0 contacts</span>
          <span class="badge">local-first</span>
          <span class="badge">no server</span>
        </div>
      </header>

      <!-- Main panel -->
      <div class="main-panel">
        <div class="form-bar">
          <input id="name-input" placeholder="Name" />
          <input id="email-input" placeholder="Email" />
          <input id="company-input" placeholder="Company" />
          <button id="add-btn">+ Add</button>
        </div>
        <div class="search-bar">
          <input id="search-input" placeholder="Search contacts..." />
        </div>
        <div id="contact-list">
          <div class="empty">Booting Syncore...</div>
        </div>
      </div>

      <!-- Log panel -->
      <div class="log-panel">
        <div class="log-header">
          <span class="log-dot"></span>
          Activity log
        </div>
        <pre id="log">Initializing...</pre>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
